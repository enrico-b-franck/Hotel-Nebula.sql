
<style>
#erd-wrap { padding: 0.5rem 0; }
#erd-wrap svg { max-width: 100%; }
.mermaid-legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; font-size:12px; color:var(--color-text-secondary); }
.leg { display:flex; align-items:center; gap:5px; }
.leg-line { width:24px; height:2px; }
.leg-one { background: var(--color-text-secondary); }
.leg-many { background: var(--color-text-info, #378ADD); }
</style>
<div id="erd-wrap">
  <div id="erd"></div>
  <div class="mermaid-legend">
    <span class="leg"><span class="leg-line leg-one"></span> 1:1</span>
    <span class="leg"><span class="leg-line leg-many"></span> 1:N</span>
    <span style="color:var(--color-text-tertiary)">Clique em qualquer entidade para explorar</span>
  </div>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a2744' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#B5D4F4' : '#042C53',
    secondaryColor: dark ? '#1a3040' : '#E1F5EE',
    tertiaryColor: dark ? '#2a1f3d' : '#EEEDFE',
  },
});

const diagram = `erDiagram
  HOSPEDES {
    int id_hospede PK
    varchar nome
    char cpf
    varchar email
    varchar telefone
    date data_nascimento
    varchar nacionalidade
  }
  CATEGORIAS_QUARTO {
    int id_categoria PK
    varchar nome
    text descricao
    numeric preco_diaria
  }
  QUARTOS {
    int id_quarto PK
    varchar numero
    int id_categoria FK
    smallint andar
    smallint capacidade
    varchar status
  }
  FUNCIONARIOS {
    int id_funcionario PK
    varchar nome
    char cpf
    varchar cargo
    varchar turno
    varchar email
    boolean ativo
  }
  RESERVAS {
    int id_reserva PK
    int id_hospede FK
    int id_quarto FK
    int id_funcionario FK
    date data_checkin
    date data_checkout
    varchar status
  }
  HOSPEDAGENS {
    int id_hospedagem PK
    int id_reserva FK
    int id_funcionario FK
    timestamp checkin_real
    timestamp checkout_real
    varchar status
  }
  SERVICOS {
    int id_servico PK
    varchar nome
    numeric preco_unitario
    varchar categoria
  }
  CONSUMO_SERVICOS {
    int id_consumo PK
    int id_hospedagem FK
    int id_servico FK
    smallint quantidade
    numeric preco_cobrado
  }
  PAGAMENTOS {
    int id_pagamento PK
    int id_hospedagem FK
    numeric valor_diarias
    numeric valor_servicos
    numeric valor_total
    varchar metodo
    varchar status
  }
  AVALIACOES {
    int id_avaliacao PK
    int id_hospedagem FK
    smallint nota_geral
    smallint nota_quarto
    smallint nota_atendimento
    smallint nota_limpeza
    text comentario
  }

  HOSPEDES ||--o{ RESERVAS : "faz"
  QUARTOS ||--o{ RESERVAS : "recebe"
  CATEGORIAS_QUARTO ||--o{ QUARTOS : "classifica"
  FUNCIONARIOS ||--o{ RESERVAS : "registra"
  RESERVAS ||--o| HOSPEDAGENS : "gera"
  FUNCIONARIOS ||--o{ HOSPEDAGENS : "realiza check-in"
  HOSPEDAGENS ||--o{ CONSUMO_SERVICOS : "consome"
  SERVICOS ||--o{ CONSUMO_SERVICOS : "compoe"
  HOSPEDAGENS ||--o| PAGAMENTOS : "gera"
  HOSPEDAGENS ||--o| AVALIACOES : "recebe"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
